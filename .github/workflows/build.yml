name: Build and Check

on:
  workflow_dispatch:
  push:
  pull_request:
  schedule:
    # 毎週月曜 0:00 UTC に実行 (linux-surface キャッシュ更新)
    - cron: "0 0 * * 1"

jobs:
  check:
    name: Check configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check flake
        run: nix flake check

  build-heavy:
    name: Build heavy packages (${{ matrix.package }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - linux-surface-lts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            cores = 0
            accept-flake-config = true

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: meatwo310-dotnix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check disk space
        run: df -h

      - name: Build ${{ matrix.package }}
        run: |
          nix build .#packages.x86_64-linux.${{ matrix.package }} \
            --print-build-logs \
            --no-link

      - name: Check disk space after build
        if: always()
        run: df -h

  build:
    name: Build system configuration
    needs: build-heavy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: meatwo310-dotnix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build sp9-v7
        run: |
          nix build .#nixosConfigurations.sp9-v7.config.system.build.toplevel \
            --print-build-logs \
            --no-link
