name: Build Surface Kernel Cache

on:
  schedule:
    # 毎週月曜 0:00 UTC に実行
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            max-jobs = auto
            cores = 0
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: meatwo310-dotnix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # longterm (LTS) カーネルをビルド & キャッシュへプッシュ
      - name: Build linux-surface (longterm/LTS)
        run: |
          nix build .#packages.x86_64-linux.linux-surface-lts \
            --print-build-logs \
            --no-link \
            -j $(nproc)

      # # stable カーネルをビルド & キャッシュへプッシュ
      # - name: Build linux-surface (stable)
      #   run: |
      #     nix build .#packages.x86_64-linux.linux-surface-stable \
      #       --print-build-logs \
      #       --no-link \
      #       -j $(nproc)
